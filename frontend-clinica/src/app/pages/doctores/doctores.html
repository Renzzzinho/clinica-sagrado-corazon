<div class="container mt-5">

  <h1 class="text-primary mb-4">
    Gestión de Doctores
  </h1>

  <div class="card mb-4 shadow">

    <div class="card-body">

      <h3 class="mb-3">
        Nuevo Doctor
      </h3>

      <div class="row g-3 align-items-end">
        <div class="col-md-3">

          <input type="text" class="form-control" placeholder="Nombre" [(ngModel)]="nuevoDoctor.nombre" />

        </div>

        <div class="col-md-2">

          <input type="text" class="form-control" placeholder="Especialidad" [(ngModel)]="nuevoDoctor.especialidad" />

        </div>

        <div class="col-md-3">

          <input type="email" class="form-control" placeholder="Email" [(ngModel)]="nuevoDoctor.email" />

        </div>

        <div class="col-md-2">

          <input type="text" class="form-control" placeholder="Teléfono" [(ngModel)]="nuevoDoctor.telefono" />

        </div>
        <div class="mb-3">

          <label class="form-label">
            Contraseña
          </label>

          <input type="password" class="form-control" [(ngModel)]="nuevoDoctor.password">

        </div>

        <div class="col-md-2">

          <button class="btn btn-primary w-100" (click)="crearDoctor()">
            Guardar
          </button>

        </div>

      </div>

    </div>

  </div>

  @if (doctorEditando) {

  <div class="card mb-4 border-warning shadow">

    <div class="card-body">

      <h3 class="text-warning mb-3">
        Editar Doctor
      </h3>

      <div class="row g-3 align-items-end">
        <div class="col-md-3">

          <input type="text" class="form-control" [(ngModel)]="doctorEditando.nombre" />

        </div>

        <div class="col-md-2">

          <input type="text" class="form-control" [(ngModel)]="doctorEditando.especialidad" />

        </div>

        <div class="col-md-3">

          <input type="email" class="form-control" [(ngModel)]="doctorEditando.email" />

        </div>

        <div class="col-md-2">

          <input type="text" class="form-control" [(ngModel)]="doctorEditando.telefono" />

        </div>

        <div class="col-md-2">

          <button class="btn btn-success w-100" (click)="guardarEdicion()">
            Guardar
          </button>

        </div>

      </div>

    </div>

  </div>

  }
  <div class="card shadow mb-4">

    <div class="card-body">

      <div class="row">

        <div class="col-md-4">

          <input type="text" class="form-control" placeholder="Buscar doctor..." [(ngModel)]="busqueda" />

        </div>

      </div>

    </div>

  </div>

  <div class="table-responsive">

    <table class="table table-hover align-middle">
      <thead class="table-dark">

        <tr>

          <th>ID</th>
          <th>Nombre</th>
          <th>Especialidad</th>
          <th>Email</th>
          <th>Teléfono</th>
          <th>Acciones</th>

        </tr>

      </thead>

      <tbody>

        @for (doctor of doctoresFiltrados; track doctor.id) {

        <tr>

          <td>{{ doctor.id }}</td>

          <td>{{ doctor.nombre }}</td>

          <td>

            <span class="badge bg-primary">

              {{ doctor.especialidad }}

            </span>

          </td>
          <td>{{ doctor.email }}</td>

          <td>{{ doctor.telefono }}</td>

          <td>

            <button class="btn btn-outline-warning btn-sm me-2" (click)="editarDoctor(doctor)">
              Editar
            </button>

            <button class="btn btn-outline-danger btn-sm" (click)="eliminarDoctor(doctor.id)">
              Eliminar
            </button>

          </td>

        </tr>

        }

      </tbody>

    </table>

  </div>

</div>
