<div class="container mt-4">

    <h2 class="mb-4">
        Mis Citas
    </h2>

    <table class="table table-bordered table-hover">

        <thead class="table-primary">

            <tr>
                <th>Paciente</th>
                <th>Fecha</th>
                <th>Estado</th>
                <th>Acción</th>
            </tr>

        </thead>

        <tbody>

            <tr *ngFor="let cita of citas">

                <td>{{ cita.paciente.nombre }}</td>

                <td>{{ cita.fechaInicio | date:'dd/MM/yyyy HH:mm' }}</td>

                <td>{{ cita.estado }}</td>

                <td>

                    <button *ngIf="cita.estado == 'PROGRAMADA'" class="btn btn-success btn-sm"
                        (click)="atender(cita.id)">

                        Atender

                    </button>

                    <span *ngIf="cita.estado == 'ATENDIDA'" class="badge bg-success">

                        ✔ Atendida

                    </span>

                    <span *ngIf="cita.estado == 'CANCELADA'" class="badge bg-danger">

                        ✖ Cancelada

                    </span>

                </td>

            </tr>

        </tbody>

    </table>

</div>
