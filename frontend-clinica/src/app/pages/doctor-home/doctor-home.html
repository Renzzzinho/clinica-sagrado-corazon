<div class="container mt-4">

    <h2>
        Bienvenido Dr. {{ nombre }}
    </h2>

    <p>
        Desde aquí podrás gestionar tus citas.
    </p>

    <div class="cards">

        <div class="card">
            <h3>{{ totalCitas }}</h3>
            <p>Total de citas</p>
        </div>

        <div class="card">
            <h3>{{ citasProgramadas }}</h3>
            <p>Citas programadas</p>
        </div>

        <div class="card">
            <h3>{{ citasAtendidas }}</h3>
            <p>Citas atendidas</p>
        </div>

    </div>

</div>
